spring:
  application:
    name: application-service
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_job_radar?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
  cloud:
    nacos:
      server-addr: localhost:8848
      discovery:
        enabled: true
        ip: 127.0.0.1
        namespace: public
        group: DEFAULT_GROUP
      config:
        enabled: false

server:
  port: 9004

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000
