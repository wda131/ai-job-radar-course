spring:
  application:
    name: job-service
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:0}
    timeout: 2000ms
  elasticsearch:
    rest:
      uris: ${ELASTICSEARCH_URIS:http://127.0.0.1:9200}
      connection-timeout: 2s
      read-timeout: 3s
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_job_radar?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
  cloud:
    nacos:
      server-addr: localhost:8848
      discovery:
        enabled: true
        ip: 127.0.0.1
        namespace: public
        group: DEFAULT_GROUP
      config:
        enabled: false

server:
  port: 9002

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
