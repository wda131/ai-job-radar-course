server:
  port: 9000

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        ip: 127.0.0.1
      config:
        enabled: false
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - 'http://localhost:5173'
              - 'http://127.0.0.1:5173'
              - 'http://localhost:5174'
              - 'http://127.0.0.1:5174'
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: '*'
            allow-credentials: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: job-service
          uri: lb://job-service
          predicates:
            - Path=/api/jobs/**
        - id: match-service
          uri: lb://match-service
          predicates:
            - Path=/api/matches/**
        - id: favorite-service
          uri: lb://application-service
          predicates:
            - Path=/api/favorites/**
        - id: application-service
          uri: lb://application-service
          predicates:
            - Path=/api/applications/**
        - id: interview-service
          uri: lb://interview-service
          predicates:
            - Path=/api/interviews/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
