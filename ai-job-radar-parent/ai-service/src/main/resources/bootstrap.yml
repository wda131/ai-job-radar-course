spring:
  application:
    name: ai-service
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        enabled: true
        ip: 127.0.0.1
        namespace: public
        group: DEFAULT_GROUP
      config:
        enabled: false

server:
  port: ${AI_SERVICE_PORT:9007}

ai:
  enabled: ${AI_ENABLED:true}
  ollama-base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
  chat-model: ${OLLAMA_CHAT_MODEL:qwen3:8b}
  embedding-model: ${OLLAMA_EMBEDDING_MODEL:qwen3-embedding:4b}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:15}
